name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Compile
        run: ./gradlew compileJava

      - name: Test
        run: ./gradlew test -x :test-app:test

      - name: Javadoc
        run: ./gradlew javadoc
