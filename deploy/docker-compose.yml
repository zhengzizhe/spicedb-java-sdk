# ============================================================
#  生产级本地集群 (Docker Compose):
#    - 3 CockroachDB nodes (Raft consensus, 4GB cache + 4GB SQL each)
#    - 3 SpiceDB instances (独立 dispatch, 512MB dispatch cache)
#    - Jaeger (tracing) + Prometheus + Grafana (monitoring)
#
#  参数来源：
#    - SpiceDB: https://authzed.com/docs/spicedb/ops/performance
#    - CRDB:    https://www.cockroachlabs.com/docs/stable/recommended-production-settings
# ============================================================

services:

  # ---- CockroachDB cluster (3 nodes) ----

  crdb-1:
    image: cockroachdb/cockroach:v24.3.4
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --advertise-addr=crdb-1 --cache=4GiB --max-sql-memory=4GiB
    hostname: crdb-1
    ports:
      - "26257:26257"   # SQL
      - "8080:8080"     # Admin UI
    volumes:
      - crdb-1-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=crdb-1 -e 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s

  crdb-2:
    image: cockroachdb/cockroach:v24.3.4
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --advertise-addr=crdb-2 --cache=4GiB --max-sql-memory=4GiB
    hostname: crdb-2
    volumes:
      - crdb-2-data:/cockroach/cockroach-data

  crdb-3:
    image: cockroachdb/cockroach:v24.3.4
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --advertise-addr=crdb-3 --cache=4GiB --max-sql-memory=4GiB
    hostname: crdb-3
    volumes:
      - crdb-3-data:/cockroach/cockroach-data

  # Initialize the CRDB cluster (one-shot)
  crdb-init:
    image: cockroachdb/cockroach:v24.3.4
    command: >
      shell -c "
        echo 'Waiting for CockroachDB to be ready...';
        for i in $$(seq 1 30); do
          cockroach init --insecure --host=crdb-1 2>/dev/null && break;
          sleep 2;
        done;
        cockroach sql --insecure --host=crdb-1 -e '
          CREATE DATABASE IF NOT EXISTS spicedb;

          -- [必须] rangefeed: SpiceDB Watch API
          SET CLUSTER SETTING kv.rangefeed.enabled = true;

          -- [热点] 自动分裂 + 负载均衡
          SET CLUSTER SETTING kv.range_split.by_load.enabled = true;
          SET CLUSTER SETTING kv.allocator.load_based_rebalancing = ''leases and replicas'';

          -- [统计] 查询优化器统计信息
          SET CLUSTER SETTING sql.stats.automatic_collection.enabled = true;

          -- [存活] 死节点判定
          SET CLUSTER SETTING server.time_until_store_dead = ''1m15s'';

          -- [一致性] closed timestamp (follower read + Watch 延迟)
          SET CLUSTER SETTING kv.closed_timestamp.target_duration = ''3s'';
          SET CLUSTER SETTING kv.closed_timestamp.side_transport_interval = ''200ms'';

          -- [事务] 事务限制
          SET CLUSTER SETTING kv.transaction.max_intents_bytes = 4194304;
          SET CLUSTER SETTING kv.transaction.max_refresh_spans_bytes = 4194304;

          -- [GC] gc.ttlseconds >= SpiceDB gc-window (1h30m = 5400s)
          ALTER DATABASE spicedb CONFIGURE ZONE USING gc.ttlseconds = 7200;

          -- [安全网] 空闲事务超时
          SET CLUSTER SETTING sql.defaults.idle_in_transaction_session_timeout = ''60s'';
        ';
        echo 'CockroachDB cluster initialized with production settings.'
      "
    depends_on:
      - crdb-1
      - crdb-2
      - crdb-3

  # ---- SpiceDB migration (one-shot) ----

  spicedb-migrate:
    image: authzed/spicedb:v1.41.0
    command: migrate head
    environment:
      SPICEDB_DATASTORE_ENGINE: cockroachdb
      SPICEDB_DATASTORE_CONN_URI: "postgresql://root@crdb-1:26257/spicedb?sslmode=disable"
    depends_on:
      crdb-init:
        condition: service_completed_successfully

  # ---- SpiceDB instances (3 nodes) ----

  spicedb-1:
    image: authzed/spicedb:v1.41.0
    command: serve
    hostname: spicedb-1
    environment: &spicedb-env
      SPICEDB_GRPC_PRESHARED_KEY: "testkey"
      SPICEDB_DATASTORE_ENGINE: cockroachdb
      SPICEDB_DATASTORE_CONN_URI: "postgresql://root@crdb-1:26257/spicedb?sslmode=disable"
      # ── 连接池 (生产级) ──
      SPICEDB_DATASTORE_CONN_POOL_READ_MAX_OPEN: "100"
      SPICEDB_DATASTORE_CONN_POOL_READ_MIN_OPEN: "50"
      SPICEDB_DATASTORE_CONN_POOL_WRITE_MAX_OPEN: "50"
      SPICEDB_DATASTORE_CONN_POOL_WRITE_MIN_OPEN: "20"
      SPICEDB_DATASTORE_CONN_POOL_READ_HEALTHCHECK_INTERVAL: "30s"
      SPICEDB_DATASTORE_CONN_POOL_WRITE_HEALTHCHECK_INTERVAL: "30s"
      SPICEDB_DATASTORE_CONN_POOL_READ_MAX_LIFETIME: "30m"
      SPICEDB_DATASTORE_CONN_POOL_WRITE_MAX_LIFETIME: "30m"
      # ── Dispatch 缓存 (生产级) ──
      SPICEDB_DISPATCH_CACHE_ENABLED: "true"
      SPICEDB_DISPATCH_CACHE_MAX_COST: "512MiB"
      SPICEDB_NS_CACHE_ENABLED: "true"
      SPICEDB_NS_CACHE_MAX_COST: "128MiB"
      # ── 一致性 ──
      SPICEDB_DATASTORE_REVISION_QUANTIZATION_INTERVAL: "5s"
      SPICEDB_DATASTORE_GC_WINDOW: "1h30m"
      SPICEDB_DATASTORE_FOLLOWER_READ_DELAY_DURATION: "4.8s"
      # ── Dispatch 并发 ──
      SPICEDB_DISPATCH_CONCURRENCY_LIMIT: "100"
      # ── gRPC ──
      SPICEDB_GRPC_MAX_CONN_AGE: "30s"
      # ── Schema 缓存 ──
      SPICEDB_ENABLE_EXPERIMENTAL_WATCHABLE_SCHEMA_CACHE: "true"
      # ── 事务 ──
      SPICEDB_DATASTORE_TX_OVERLAP_STRATEGY: insecure
      # ── OTel ──
      SPICEDB_OTEL_PROVIDER: "otlpgrpc"
      SPICEDB_OTEL_ENDPOINT: "jaeger:4317"
      SPICEDB_OTEL_INSECURE: "true"
      SPICEDB_OTEL_SAMPLE_RATIO: "1.0"
      # ── Telemetry ──
      SPICEDB_TELEMETRY_ENDPOINT: ""
      SPICEDB_LOG_LEVEL: info
    ports:
      - "50061:50051"   # gRPC
      - "8443:8443"     # HTTP gateway
      - "9090:9090"     # metrics
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  spicedb-2:
    image: authzed/spicedb:v1.41.0
    command: serve
    hostname: spicedb-2
    environment:
      <<: *spicedb-env
      SPICEDB_DATASTORE_CONN_URI: "postgresql://root@crdb-2:26257/spicedb?sslmode=disable"
    ports:
      - "50062:50051"
      - "8444:8443"
      - "9091:9090"
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully

  spicedb-3:
    image: authzed/spicedb:v1.41.0
    command: serve
    hostname: spicedb-3
    environment:
      <<: *spicedb-env
      SPICEDB_DATASTORE_CONN_URI: "postgresql://root@crdb-3:26257/spicedb?sslmode=disable"
    ports:
      - "50063:50051"
      - "8445:8443"
      - "9092:9090"
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully

  # ---- Schema writer (loads test schema into SpiceDB) ----

  schema-writer:
    image: authzed/zed:v0.24.0
    entrypoint: >
      sh -c "
        sleep 5;
        zed schema write --endpoint=spicedb-1:50051 --insecure --token=testkey /schema/schema.zed;
        echo 'Schema written successfully.'
      "
    volumes:
      - ./schema.zed:/schema/schema.zed:ro
    depends_on:
      - spicedb-1
      - spicedb-migrate

  # ---- Jaeger (trace collector + UI) ----

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

  # ---- Prometheus + Grafana (monitoring) ----

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9093:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  crdb-1-data:
  crdb-2-data:
  crdb-3-data:
