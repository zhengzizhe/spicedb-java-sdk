name: document library benchmark
weight: 1
steps:
# ‚îÄ‚îÄ Check document view (most common, traverses folder‚Üíancestors‚Üíspace) ‚îÄ‚îÄ
{{- range $i := enumerate 40 }}
- op: CheckPermission
  resource: document:d_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}
  subject: user:user_{{ randomObjectID }}_{{ randomObjectID }}
  permission: view
{{- end }}

# ‚îÄ‚îÄ Check document edit ‚îÄ‚îÄ
{{- range $i := enumerate 20 }}
- op: CheckPermission
  resource: document:d_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}
  subject: user:user_{{ randomObjectID }}_{{ randomObjectID }}
  permission: edit
{{- end }}

# ‚îÄ‚îÄ Check folder view (ancestor dispatch) ‚îÄ‚îÄ
{{- range $i := enumerate 20 }}
- op: CheckPermission
  resource: folder:f_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}
  subject: user:user_{{ randomObjectID }}_{{ randomObjectID }}
  permission: view
{{- end }}

# ‚îÄ‚îÄ Check space view ‚îÄ‚îÄ
{{- range $i := enumerate 10 }}
- op: CheckPermission
  resource: space:space_{{ randomObjectID }}_{{ randomObjectID }}
  subject: user:user_{{ randomObjectID }}_{{ randomObjectID }}
  permission: view
{{- end }}

# ‚îÄ‚îÄ Write: grant + revoke ‚îÄ‚îÄ
{{- range $i := enumerate 10 }}
- op: WriteRelationships
  updates:
  - op: TOUCH
    resource: document:d_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}
    subject: user:user_{{ randomObjectID }}_{{ randomObjectID }}
    relation: viewer
- op: WriteRelationships
  updates:
  - op: DELETE
    resource: document:d_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}_{{ randomObjectID }}
    subject: user:user_{{ randomObjectID }}_{{ randomObjectID }}
    relation: viewer
{{- end }}
