name: seed document library
weight: 1
steps:
# ── 10 orgs × 1000 members = 10,000 users (split 500/batch) ──
{{- range $org := enumerate 10 }}
- op: WriteRelationships
  updates:
{{- range $u := enumerate 500 }}
  - op: TOUCH
    resource: organization:org_{{ $org }}
    subject: user:user_{{ $org }}_{{ $u }}
    relation: member
{{- end }}
- op: WriteRelationships
  updates:
{{- range $u := enumerate 500 }}
  - op: TOUCH
    resource: organization:org_{{ $org }}
    subject: user:user_{{ $org }}_5{{ $u }}
    relation: member
{{- end }}
  - op: TOUCH
    resource: organization:org_{{ $org }}
    subject: user:admin_{{ $org }}
    relation: admin
{{- end }}

# ── 500 departments (50/org) × 20 members, split into 5 batches of 10 depts ──
{{- range $org := enumerate 10 }}
{{- range $batch := enumerate 5 }}
- op: WriteRelationships
  updates:
{{- range $d := enumerate 10 }}
{{- range $m := enumerate 20 }}
  - op: TOUCH
    resource: department:dept_{{ $org }}_{{ $batch }}_{{ $d }}
    subject: user:user_{{ $org }}_{{ $m }}
    relation: member
{{- end }}
{{- end }}
{{- end }}
{{- end }}

# ── 200 groups (20/org) × 50 members, split 10 groups/batch ──
{{- range $org := enumerate 10 }}
{{- range $batch := enumerate 2 }}
- op: WriteRelationships
  updates:
{{- range $g := enumerate 10 }}
{{- range $m := enumerate 50 }}
  - op: TOUCH
    resource: group:group_{{ $org }}_{{ $batch }}_{{ $g }}
    subject: user:user_{{ $org }}_{{ $m }}
    relation: member
{{- end }}
{{- end }}
{{- end }}
{{- end }}

# ── 1000 spaces (100/org) with org + owner + members ──
{{- range $org := enumerate 10 }}
{{- range $s := enumerate 100 }}
- op: WriteRelationships
  updates:
  - op: TOUCH
    resource: space:space_{{ $org }}_{{ $s }}
    subject: organization:org_{{ $org }}
    relation: org
  - op: TOUCH
    resource: space:space_{{ $org }}_{{ $s }}
    subject: user:admin_{{ $org }}
    relation: owner
{{- range $m := enumerate 10 }}
  - op: TOUCH
    resource: space:space_{{ $org }}_{{ $s }}
    subject: user:user_{{ $org }}_{{ $m }}
    relation: member
{{- end }}
{{- end }}
{{- end }}

# ── 10,000 folders (10/space) + ancestor chains ──
{{- range $org := enumerate 10 }}
{{- range $s := enumerate 100 }}
- op: WriteRelationships
  updates:
{{- range $f := enumerate 10 }}
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_{{ $f }}
    subject: space:space_{{ $org }}_{{ $s }}
    relation: space
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_{{ $f }}
    subject: user:user_{{ $org }}_{{ $f }}
    relation: editor
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_{{ $f }}
    subject: user:user_{{ $org }}_{{ $s }}
    relation: viewer
{{- end }}
  # Ancestor chain: 1→0
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_1
    subject: folder:f_{{ $org }}_{{ $s }}_0
    relation: ancestor
  # 2→1,0
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_2
    subject: folder:f_{{ $org }}_{{ $s }}_0
    relation: ancestor
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_2
    subject: folder:f_{{ $org }}_{{ $s }}_1
    relation: ancestor
  # 3→2,1,0
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_3
    subject: folder:f_{{ $org }}_{{ $s }}_0
    relation: ancestor
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_3
    subject: folder:f_{{ $org }}_{{ $s }}_1
    relation: ancestor
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_3
    subject: folder:f_{{ $org }}_{{ $s }}_2
    relation: ancestor
  # 4→3,2,1,0
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_4
    subject: folder:f_{{ $org }}_{{ $s }}_0
    relation: ancestor
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_4
    subject: folder:f_{{ $org }}_{{ $s }}_1
    relation: ancestor
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_4
    subject: folder:f_{{ $org }}_{{ $s }}_2
    relation: ancestor
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_4
    subject: folder:f_{{ $org }}_{{ $s }}_3
    relation: ancestor
  # 5→4..0
{{- range $a := enumerate 5 }}
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_5
    subject: folder:f_{{ $org }}_{{ $s }}_{{ $a }}
    relation: ancestor
{{- end }}
  # 6→5..0
{{- range $a := enumerate 6 }}
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_6
    subject: folder:f_{{ $org }}_{{ $s }}_{{ $a }}
    relation: ancestor
{{- end }}
  # 7→6..0
{{- range $a := enumerate 7 }}
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_7
    subject: folder:f_{{ $org }}_{{ $s }}_{{ $a }}
    relation: ancestor
{{- end }}
  # 8→7..0
{{- range $a := enumerate 8 }}
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_8
    subject: folder:f_{{ $org }}_{{ $s }}_{{ $a }}
    relation: ancestor
{{- end }}
  # 9→8..0
{{- range $a := enumerate 9 }}
  - op: TOUCH
    resource: folder:f_{{ $org }}_{{ $s }}_9
    subject: folder:f_{{ $org }}_{{ $s }}_{{ $a }}
    relation: ancestor
{{- end }}
{{- end }}
{{- end }}

# ── 50,000 documents (5/folder) ──
{{- range $org := enumerate 10 }}
{{- range $s := enumerate 100 }}
- op: WriteRelationships
  updates:
{{- range $f := enumerate 10 }}
{{- range $d := enumerate 5 }}
  - op: TOUCH
    resource: document:d_{{ $org }}_{{ $s }}_{{ $f }}_{{ $d }}
    subject: folder:f_{{ $org }}_{{ $s }}_{{ $f }}
    relation: folder
  - op: TOUCH
    resource: document:d_{{ $org }}_{{ $s }}_{{ $f }}_{{ $d }}
    subject: space:space_{{ $org }}_{{ $s }}
    relation: space
  - op: TOUCH
    resource: document:d_{{ $org }}_{{ $s }}_{{ $f }}_{{ $d }}
    subject: user:user_{{ $org }}_{{ $d }}
    relation: owner
  - op: TOUCH
    resource: document:d_{{ $org }}_{{ $s }}_{{ $f }}_{{ $d }}
    subject: user:user_{{ $org }}_{{ $f }}
    relation: editor
  - op: TOUCH
    resource: document:d_{{ $org }}_{{ $s }}_{{ $f }}_{{ $d }}
    subject: user:user_{{ $org }}_{{ $s }}
    relation: viewer
{{- end }}
{{- end }}
{{- end }}
{{- end }}
