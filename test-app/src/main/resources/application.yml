server:
  port: 8081

spicedb:
  target: "${SPICEDB_TARGET:localhost:50051}"
  target-secondary: "${SPICEDB_TARGET_SECONDARY:localhost:50052}"
  preshared-key: "${SPICEDB_PRESHARED_KEY:somerandomkeyhere}"
  cache-enabled: true
  cache-max-size: 10000
  watch-invalidation: true
  virtual-threads: true
